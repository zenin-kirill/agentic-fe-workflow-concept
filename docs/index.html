  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: #46586f;\n  --ink-mute: #8294a8;\n  --line: #d4dde6;\n  --line-2: #b9c6d3;\n  --grid: rgba(31, 58, 92, 0.06);\n  --accent: #2767ad;       /* blueprint blue */\n  --accent-soft: #e8f0f8;\n  --opt: #c47a18;          /* optional / highlight amber */\n  --opt-soft: #fbf1de;\n  --ok: #3f7d52;           /* checks / gates passed */\n  --ok-soft: #e7f0e9;\n  --ok-ink: #2f5d3d;       /* dark green text */\n  --stop: #b14a26;         /* return loops */\n  --ghost: #eef2f6;        /* external stages */\n}\n\n* { box-sizing: border-box; }\n\ndeck-stage { background: #0c0f15; }\n\nsection.slide {\n  font-family: 'Inter Tight', 'Helvetica Neue', Arial, sans-serif;\n  color: var(--ink);\n  background:\n    linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / 48px 48px,\n    linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / 48px 48px,\n    var(--paper);\n  position: relative;\n  overflow: hidden;\n}\n\n/* corner registration ticks */\n.corners { position: absolute; inset: 44px; pointer-events: none; }\n.corners > i { position: absolute; width: 26px; height: 26px; border: 0 solid var(--line-2); }\n.corners > i:nth-child(1) { top: 0; left: 0; border-top-width: 2px; border-left-width: 2px; }\n.corners > i:nth-child(2) { top: 0; right: 0; border-top-width: 2px; border-right-width: 2px; }\n.corners > i:nth-child(3) { bottom: 0; left: 0; border-bottom-width: 2px; border-left-width: 2px; }\n.corners > i:nth-child(4) { bottom: 0; right: 0; border-bottom-width: 2px; border-right-width: 2px; }\n\n.frame {\n  position: absolute;\n  inset: 92px 96px 92px 96px;\n  display: flex;\n  flex-direction: column;\n}\n\n/* header */\n.eyebrow {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 25px;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--accent);\n  display: flex;\n  align-items: center;\n  gap: 16px;\n}\n.eyebrow .num {\n  color: var(--ink-mute);\n  border: 1.5px solid var(--line-2);\n  padding: 2px 10px;\n  font-size: 24px;\n}\n.title {\n  f 002Fi><\u002Fdiv>\n  <div class=\"frame\">\n    <div class=\"eyebrow\"><span class=\"num\">06 / 20<\u002Fspan> Методология процесса<\u002Fdiv>\n    <h2 class=\"title title-sm\" style=\"margin-top: 14px;\">Применение практик BDD и TDD для обеспечения качества<\u002Fh2>\n    <p class=\"lead\" style=\"font-size: 27px;\">Разработка строится вокруг поведения и тестов: BDD описывает ожидаемое поведение сценариями, а TDD превращает их в проверки, которые код обязан удовлетворить — корректность становится проверяемой, а не предполагаемой.<\u002Fp>\n\n    <!-- pipeline · two zones -->\n    <div class=\"tdd-track\">\n      <div class=\"zone zbdd\">\n        <div class=\"zlabel\">BDD · ПЛАН — описываем поведение<\u002Fdiv>\n        <div class=\"zrow\">\n          <div class=\"st acc\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2767ad\" stroke-width=\"2\"><rect x=\"5\" y=\"3\" width=\"14\" height=\"18\"><\u002Frect><path d=\"M8 8h8M8 12h8M8 16h5\"><\u002Fpath><\u002Fsvg><b>Описание сценариев<\u002Fb><i>Given · When · Then<\u002Fi><\u002Fdiv>\n          <svg class=\"chev\" width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M9 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n          <div class=\"st acc\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2767ad\" stroke-width=\"2\"><rect x=\"4\" y=\"4\" width=\"16\" height=\"16\"><\u002Frect><path d=\"M7 9l2 2 3-3M7 15l2 2 3-3\"><\u002Fpath><\u002Fsvg><b>Спецификация тестов<\u002Fb><i>describe / it<\u002Fi><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"zarrow\"><svg width=\"34\" height=\"22\" viewBox=\"0 0 34 22\" fill=\"none\" stroke=\"#8294a8\" stroke-width=\"2\"><path d=\"M1 11h28\"><\u002Fpath><path d=\"M23 4l8 7-8 7\"><\u002Fpath><\u002Fsvg><span>материали­зуется<\u002Fspan><\u002Fdiv>\n\n      <div class=\"zone ztdd\">\n        <div class=\"zlabel\">TDD · РЕАЛИЗАЦИЯ — создаём решение через тесты<\u002Fdiv>\n        <div class=\"zrow\">\n          <div class=\"st red\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#b14a26\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M9 9l6 6M15 9l-6 6\"><\u002Fpath><\u002Fsvg><b>Написание тестов<\u002Fb><i>падающие тесты по сценариям<\u002Fi><\u002Fdiv>\n          <div class=\"gate2\"><div class=\"dia\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3f7d52\" stroke-width=\"2.4\"><path d=\"M8 12l3 3 5-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv><span class=\"gl\">Проверка корректности и полноты тестов<\u002Fspan><\u002Fdiv>\n          <div class=\"st grn\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3f7d52\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M8 12l3 3 5-6\"><\u002Fpath><\u002Fsvg><b>Реализация решения<\u002Fb><i>код до прохождения тестов<\u002Fi><\u002Fdiv>\n          <div class=\"gate2\"><div class=\"dia\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3f7d52\" stroke-width=\"2.4\"><path d=\"M8 12l3 3 5-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv><span class=\"gl\">Проверка неизменности тестов<\u002Fspan><\u002Fdiv>\n          <div class=\"st drk\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><b>Далее<\u002Fb><i style=\"color:#aab8c8;\">ревью · приёмка · коммит<\u002Fi><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- tiers + guarantees -->\n    <div class=\"row g4\" style=\"margin-top: 10px; flex: 1; align-items: stretch;\">\n      <div class=\"card\" style=\"flex: 1; padding: 22px 26px;\">\n        <div class=\"row between\" style=\"align-items: baseline;\"><div class=\"role-sub\">ТРИ УРОВНЯ ДОКАЗАТЕЛЬСТВА<\u002Fdiv><span class=\"mono\" style=\"font-size: 15px; color: var(--ink-mute);\">▮▮▮ строже → ▮ мягче<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size: 18px; color: var(--ink-mute); margin-top: 8px;\">Чем больше в коде логики, тем строже требуется доказательство<\u002Fdiv>\n        <div class=\"col\" style=\"gap: 16px; margin-top: 18px; flex: 1; justify-content: center;\">\n          <div class=\"tdd-tier t-core\">\n            <div class=\"hd\"><b>Ядро логики<\u002Fb><span class=\"en\">core<\u002Fspan><span class=\"tdd-dots\"><span class=\"on\"><\u002Fspan><span class=\"on\"><\u002Fspan><span class=\"on\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n            <div class=\"ex\"><b>Где:<\u002Fb> бизнес-логика, расчёты, состояние<\u002Fdiv>\n            <div class=\"ds\">Инспектор сам перепрогоняет тесты и видит переход красный → зелёный<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tdd-tier t-peri\">\n            <div class=\"hd\"><b>Периферия<\u002Fb><span class=\"en\">peripheral<\u002Fspan><span class=\"tdd-dots\"><span class=\"on\"><\u002Fspan><span class=\"on\"><\u002Fspan><span class=\"off\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n            <div class=\"ex\"><b>Где:<\u002Fb> хелперы, форматирование, простые хуки<\u002Fdiv>\n            <div class=\"ds\">Достаточно кода теста и лога его падения — без перепрогона<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tdd-tier t-infra\">\n            <div class=\"hd\"><b>Тонкие обёртки<\u002Fb><span class=\"en\">infra-green<\u002Fspan><span class=\"tdd-dots\"><span class=\"on\"><\u002Fspan><span class=\"off\"><\u002Fspan><span class=\"off\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n            <div class=\"ex\"><b>Где:<\u002Fb> адаптеры и проброс пропсов без логики<\u002Fdiv>\n            <div class=\"ds\">Красная фаза не нужна — хватает осмысленного зелёного теста<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"flex: 1.15; padding: 22px 26px;\">\n        <div class=\"role-sub\">ЧТО ЭТО ДАЁТ<\u002Fdiv>\n        <div class=\"col\" style=\"gap: 15px; margin-top: 22px; flex: 1; justify-content: center;\">\n          <div class=\"tdd-guar\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3f7d52\" stroke-width=\"2.2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M8 12l3 3 5-6\"><\u002Fpath><\u002Fsvg><div>Каждый критерий приёмки закрыт тестом — требование без теста не пройдёт проверку<\u002Fdiv><\u002Fdiv>\n          <div class=\"tdd-guar\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3f7d52\" stroke-width=\"2.2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M8 12l3 3 5-6\"><\u002Fpath><\u002Fsvg><div>Ошибки на стыке «клик → запрос → отрисовка» ловят интеграционные тесты на моках API (MSW)<\u002Fdiv><\u002Fdiv>\n          <div class=\"tdd-guar\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3f7d52\" stroke-width=\"2.2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M8 12l3 3 5-6\"><\u002Fpath><\u002Fsvg><div>Тест нельзя ослабить ради зелёного прогона — проверки можно только добавлять или ужесточать<\u002Fdiv><\u002Fdiv>\n          <div class=\"tdd-guar\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3f7d52\" stroke-width=\"2.2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M8 12l3 3 5-6\"><\u002Fpath><\u002Fsvg><div>Зелёный результат подтверждает независимый инспектор, а не сам исполнитель<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"note\" style=\"margin-top: 4px; font-size: 23px;\">Пирамида: unit и integration (Vitest, red-first) — в цикле; e2e и визуал (Playwright / Chrome DevTools MCP) — отдельный acceptance-слой.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot\"><div class=\"brand\"><span class=\"mk\"><\u002Fspan><span>@kzenin<\u002Fspan><\u002Fdiv><div>лист 06<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n\n\n<!-- 18 · HOOKS & STATES -->\n<section class=\"slide\" data-label=\"07 Обработчики событий\">\n  <div class=\"corners\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n  <div class=\"frame\">\n    <div class=\"eyebrow\"><span class=\"num\">07 / 20<\u002Fspan> Опора процесса · хуки<\u002Fdiv>\n    <h2 class=\"title title-sm\" style=\"margin-top: 14px;\">Слой автоматики на базе хуков<\u002Fh2>\n    <p class=\"lead\" style=\"font-size: 27px;\">Среда сообщает о каждом событии сессии. Хук — единая точка, которая его перехватывает и решает, что делать.<\u002Fp>\n\n    <!-- events → hook → outcomes -->\n    <div class=\"row\" style=\"margin-top: 34px; flex: 1; align-items: stretch; gap: 20px;\">\n\n      <!-- events -->\n      <div class=\"col\" style=\"width: 320px; gap: 11px; justify-content: center;\">\n        <div class=\"mono\" style=\"font-size: 24px; color: var(--ink-mute); letter-spacing: 0.08em;\">СОБЫТИЯ СРЕДЫ<\u002Fdiv>\n        <div class=\"chip\">Начало сессии<\u002Fdiv>\n        <div class=\"chip\">Ввод инженера<\u002Fdiv>\n        <div class=\"chip\">Перед действием<\u002Fdiv>\n        <div class=\"chip\">После действия<\u002Fdiv>\n        <div class=\"chip\">Остановка<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"arrow\" style=\"align-self: center;\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1f3a5c\" stroke-width=\"2.5\"><path d=\"M8 4l8 8-8 8\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n\n      <!-- hook -->\n      <div class=\"card\" style=\"width: 340px; background: #1f3a5c; border-color: #1f3a5c; align-items: center; justify-content: center; text-align: center;\">\n        <div class=\"mono\" style=\"font-size: 24px; color: #9dc0e6; letter-spacing: 0.14em;\">ЕДИНАЯ ТОЧКА<\u002Fdiv>\n        <div style=\"font-size: 52px; font-weight: 700; color: #fff; margin-top: 8px;\">Хук<\u002Fdiv>\n        <div style=\"font-size: 24px; color: #cddcec; margin-top: 14px; line-height: 1.4;\">На каждом событии решает:<br>разрешить · запретить · записать<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"arrow\" style=\"align-self: center;\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1f3a5c\" stroke-width=\"2.5\"><path d=\"M8 4l8 8-8 8\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n\n      <!-- outcomes -->\n      <div class=\"col\" style=\"flex: 1; gap: 14px; justify-content: center;\">\n        <div class=\"card\" style=\"padding: 18px 24px; border-color: var(--ok); border-left-width: 6px;\">\n          <div style=\"font-size: 26px; font-weight: 700; color: var(--ok-ink);\">Контроль процесса<\u002Fdiv>\n          <div class=\"desc\" style=\"font-size: 24px; margin-top: 4px;\">Допускает переход между этапами только после проверок и согласия — две контрольные точки: к реализации и к коммиту. Предоставляет сессионную директорию для артефактов.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"padding: 18px 24px; border-color: var(--stop); border-left-width: 6px;\">\n          <div style=\"font-size: 26px; font-weight: 700; color: var(--danger-ink, #6b2a14);\">Ограничения действий<\u002Fdiv>\n          <div class=\"desc\" style=\"font-size: 24px; margin-top: 4px;\">Чужие артефакты сессии — запрет; старт реализации без подтверждения пользователя —&nbsp;запрет, коммит без положительного вердикта — запрет.\nПри этом агент получает пояснения о причинах и необходимых действиях.&nbsp;<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"padding: 18px 24px; border-color: var(--accent); border-left-width: 6px;\">\n          <div style=\"font-size: 26px; font-weight: 700; color: var(--accent);\">Учёт<\u002Fdiv>\n          <div class=\"desc\" style=\"font-size: 24px; margin-top: 4px;\">Фиксирует состояние задачи и пишет журнал событий — для прослеживаемости.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"note\" style=\"margin-top: 22px;\">Процесс задачи проходит состояния <b>Покой → Планирование → Реализация → Коммит<\u002Fb>; хук охраняет переходы между ними и сбрасывает процесс при остановке.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot\"><div class=\"brand\"><span class=\"mk\"><\u002Fspan><span>@kzenin<\u002Fspan><\u002Fdiv><div>лист 07<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n\n\n<!-- 06 · ARTIFACTS -->\n<section class=\"slide\" data-label=\"08 Артефакты\">\n  <div class=\"corners\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n  <div class=\"frame\">\n    <div class=\"eyebrow\"><span class=\"num\">08 / 20<\u002Fspan> Артефакты процесса<\u002Fdiv>\n    <h2 class=\"title title-sm\" style=\"margin-top: 14px;\">Артефакты, создаваемые в процессе работы<\u002Fh2>\n\n    <!-- header row -->\n    <div class=\"row\" style=\"margin-top: 32px; gap: 28px; padding: 0 0 10px;\">\n      <div class=\"mono\" style=\"flex: 1.6; font-size: 24px; color: var(--ink-mute); letter-spacing: 0.1em;\">АРТЕФАКТ<\u002Fdiv>\n      <div class=\"mono\" style=\"flex: 1; font-size: 24px; color: var(--ink-mute); letter-spacing: 0.1em;\">КТО ПОДГОТАВЛИВАЕТ<\u002Fdiv>\n      <div class=\"mono\" style=\"flex: 1.3; font-size: 24px; color: var(--ink-mute); letter-spacing: 0.1em;\">ДЛЯ ЧЕГО НУЖЕН<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- rows -->\n    <div class=\"col\" style=\"flex: 1;\">\n      <div class=\"row\" style=\"align-items: center; gap: 28px; border-top: 2px solid var(--line); padding: 15px 0; flex: 1;\">\n        <div class=\"row g3\" style=\"flex: 1.6; align-items: center;\">\n          <div class=\"glyph\" style=\"width: 44px; height: 44px;\"><svg viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2767ad\" stroke-width=\"2.5\"><rect x=\"16\" y=\"9\" width=\"32\" height=\"46\"><\u002Frect><path d=\"M22 22h20M22 31h20M22 40h12\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div><div style=\"font-size: 27px; font-weight: 700;\">План задачи<\u002Fdiv><div class=\"desc\" style=\"font-size: 24px;\">требования, шаги работ, раздел «Верификация»<\u002Fdiv><\u002Fdiv>\n задачи<\u002Fli>\n        <\u002Ful>\n        <div class=\"feat\"><div class=\"attrs\"><span class=\"k\">Модель<\u002Fspan><span class=\"v\">базовая<\u002Fspan><span class=\"k\">Режим<\u002Fspan><span class=\"v\"><b>только чтение<\u002Fb><\u002Fspan><span class=\"k\">Опора<\u002Fspan><span class=\"v\">простота решения<\u002Fspan><\u002Fdiv><span class=\"feat-k\">СИЛЬНАЯ СТОРОНА —<\u002Fspan> единственная роль, которая борется за упрощение, а не за добавление кода.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"note\" style=\"margin-top: 32px;\">Это <b>рекомендованные<\u002Fb> проверки: их заключения фиксируются, но переход не блокируют — степень их обязательности задаёт план.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot\"><div class=\"brand\"><span class=\"mk\"><\u002Fspan><span>@kzenin<\u002Fspan><\u002Fdiv><div>лист 15<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n\n\n<!-- 13 · TESTER & DEBUGGER -->\n<section class=\"slide\" data-label=\"16 Тестировщик и отладчик\">\n  <div class=\"corners\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n  <div class=\"frame\">\n    <div class=\"eyebrow\"><span class=\"num\">16 / 20<\u002Fspan> <span style=\"background: var(--ink-2); color: #fff; padding: 2px 12px;\">Этап 2<\u002Fspan> реализация · проверка вживую<\u002Fdiv>\n    <h2 class=\"title title-sm\" style=\"margin-top: 14px;\">Тестировщик и отладчик<\u002Fh2>\n\n    <div class=\"row g5\" style=\"margin-top: 44px; flex: 1; align-items: stretch;\">\n      <div class=\"card grow\">\n        <div class=\"row g3\" style=\"align-items: center;\">\n          <div class=\"glyph\"><svg viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#2767ad\" stroke-width=\"2.5\"><ellipse cx=\"32\" cy=\"36\" rx=\"12\" ry=\"14\"><\u002Fellipse><path d=\"M32 22v28\"><\u002Fpath><path d=\"M20 30l-8-6M44 30l8-6M19 36h-9M54 36h-9M20 44l-8 6M44 44l8 6\"><\u002Fpath><path d=\"M25 16a7 7 0 0114 0\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div><div class=\"role\">Ручное т eat-k\">СИЛЬНАЯ СТОРОНА —<\u002Fspan> воспроизводит проблему в живом браузере, при необходимости добавляет отладочные логи и убирает их по завершении — находит то, что не видно по коду.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"note opt\" style=\"margin-top: 32px;\">Подключаются по необходимости: ручное тестирование — только при явном согласии инженера и когда важны живые сценарии; отладчик — при неясных причинах сбоя.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot\"><div class=\"brand\"><span class=\"mk\"><\u002Fspan><span>@kzenin<\u002Fspan><\u002Fdiv><div>лист 16<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n\n\n<!-- 13b · COMMITS & RELEASE -->\n<section class=\"slide\" data-label=\"17 Коммиты и релиз\">\n  <div class=\"corners\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n  <div class=\"frame\">\n    <div class=\"eyebrow\"><span class=\"num\">17 / 20<\u002Fspan> <span style=\"background: var(--ink-2); color: #fff; padding: 2px 12px;\">Этап 2<\u002Fspan> реализация · финализация<\u002Fdiv>\n    <h2 class=\"title title-sm\" style=\"margin-top: 14px;\">Соглашение о коммитах и релиз<\u002Fh2>\n\n    <div class=\"row g5\" style=\"margin-top: 40px; flex: 1; align-items: stretch;\">\n      <div class=\"card grow\">\n        <div class=\"role\" style=\"font-size: 34px;\">Соглашение о коммитах<\u002Fdiv>\n        <div class=\"role-sub\">единый формат сообщения<\u002Fdiv>\n        <div class=\"desc\" style=\"margin-top: 14px;\">Каждое сообщение строится по общему шаблону — история изменений остаётся читаемой и пригодной для автоматики.<\u002Fdiv>\n        <div style=\"margin-top: 20px; background: #f7f9fb; border: 1.5px solid var(--line-2); padding: 20px 22px; font-family: 'JetBrains Mono', monospace; font-size: 24px; line-height: 1.6;\">\n          <span style=\"color: #2767ad;\">тип<\u002Fspan>(<span style=\"color: #c47a18;\">область<\u002Fspan>): краткое описание<br>\n          <span style=\"color: #8294a8;\">подробности при необхо ckage.json<\u002Fspan> и <span class=\"mono\">CHANGELOG.md<\u002Fspan> одновременно<\u002Fli>\n          <li>Завершение и публикация веток <span class=\"mono\">main<\u002Fspan>, <span class=\"mono\">develop<\u002Fspan> и тегов; release-ветка не сохраняется<\u002Fli>\n        <\u002Ful>\n        <div class=\"feat opt\"><span class=\"feat-k\">ОСОБЕННОСТЬ —<\u002Fspan> весь релиз выполняет один скрипт: расчёт версии, журнал изменений и публикацию. В отчёте — прошлая и новая версия, какие коммиты подняли версию, хеш и тег.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"foot\"><div class=\"brand\"><span class=\"mk\"><\u002Fspan><span>@kzenin<\u002Fspan><\u002Fdiv><div>лист 17<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n\n\n<!-- 14 · DOC CURATOR & STRUCTURE -->\n<section class=\"slide\" data-label=\"18 Документация агентов\">\n  <div class=\"corners\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n  <div class=\"frame\">\n    <div class=\"eyebrow\"><span class=\"num\">18 / 20<\u002Fspan> Сопровождение · память проекта<\u002Fdiv>\n    <h2 class=\"title title-sm\" style=\"margin-top: 14px;\">Документация агентов<\u002Fh2>\n    <p class=\"lead\" style=\"font-size: 28px;\">Долгоживущие знания о проекте и правила работы с ним хранятся в файлах документации для агентов. Роли двух файлов строго разделены — это не даёт документации расплываться.<\u002Fp>\n\n    <!-- two file roles -->\n    <div class=\"row g4\" style=\"margin-top: 28px; align-items: stretch;\">\n      <div class=\"card\" style=\"flex: 1; padding: 24px 28px; border-color: var(--accent);\">\n        <div class=\"row between\" style=\"align-items: baseline;\">\n          <div class=\"mono\" style=\"font-size: 28px; font-weight: 700; color: var(--accent);\">AGENTS.md<\u002Fdiv>\n          <span class=\"tag acc\">источник истины<\u002Fspan>\n        <\u002Fdiv>\n        <ul class=\"b\" style=\"margin-top: 16px;\">\n          <li>Канонический слой содержательных инструкций<\u0
